#
# $XDG_CONFIG_HOME/psd/psd.conf
#

# Use overlayfs to reduce memory usage and improve sync speed.
USE_OVERLAYFS="yes"

# Resync on suspend to reduce potential data loss.
USE_SUSPSYNC="yes"

# Only manage Flatpak Vivaldi — native vivaldi is not installed.
# flatpak_vivaldi is a custom browser definition in ~/.config/psd/browser/
BROWSERS=(flatpak_vivaldi)

USE_BACKUPS="yes"
BACKUP_LIMIT=2
