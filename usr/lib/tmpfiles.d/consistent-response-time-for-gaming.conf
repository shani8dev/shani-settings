# tmpfiles.d — ShaniOS gaming response time tuning.
# Sets sysfs/debugfs knobs that cannot be configured via sysctl.d.
# Companion to the sysctl conf files; applied by systemd-tmpfiles at boot.
#
# Type  Path                                                  Mode User Group Age Argument

# ── MGLRU (Multi-Gen LRU) ─────────────────────────────────────────────────────
# Enable all MGLRU features: 0x1 (core) | 0x4 (swappiness hint) = 5.
# MGLRU significantly reduces latency on memory pressure by better predicting
# which pages to evict. Requires kernel 6.1+.
w /sys/kernel/mm/lru_gen/enabled                              -    -    -     - 5

# ── Transparent Huge Pages ────────────────────────────────────────────────────
# Use THP only when applications explicitly request it (madvise(MADV_HUGEPAGE)).
# "always" wastes memory and causes latency spikes from background khugepaged;
# "never" loses the benefit for games/Wine that do request it.
w /sys/kernel/mm/transparent_hugepage/enabled                 -    -    -     - madvise

# Allow THP for shared memory (tmpfs/shmem) on request only.
w /sys/kernel/mm/transparent_hugepage/shmem_enabled           -    -    -     - advise

# Never defrag THP pages in the background — eliminates compaction stalls.
w /sys/kernel/mm/transparent_hugepage/defrag                  -    -    -     - never

# ── EEVDF / CFS scheduler (debugfs) ──────────────────────────────────────────
# Base scheduling slice for EEVDF (kernel 6.6+). 3 ms matches the
# sched_cfs_bandwidth_slice_us value set in 20-sched.conf.
w /sys/kernel/debug/sched/base_slice_ns                       -    -    -     - 3000000

# Task migration cost via debugfs (mirrors kernel.sched_migration_cost_ns).
# Some kernel versions only honour the debugfs path; set both for consistency.
w /sys/kernel/debug/sched/migration_cost_ns                   -    -    -     - 250000

# Maximum tasks migrated per load-balance pass (default: 32).
# 8 reduces migration overhead under gaming/desktop workloads.
w /sys/kernel/debug/sched/nr_migrate                          -    -    -     - 8
