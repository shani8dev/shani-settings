# /usr/lib/tmpfiles.d/samba.conf — ShaniOS
# Creates the usershare directory for Samba on first boot.
# /var/lib/samba is bind-mounted from /data/varlib/samba (@data subvolume)
# so this directory persists across blue/green root switches automatically.
#
# Type  Path                          Mode  User  Group       Age  Argument
d       /var/lib/samba/usershare      1770  root  sambashare  -    -
