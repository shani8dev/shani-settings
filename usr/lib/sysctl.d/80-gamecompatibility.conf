# Game & container compatibility sysctl settings for ShaniOS.
# Addresses limits that cause crashes, hangs, or silent failures in games,
# launchers (Steam, Lutris), and container runtimes:
#   Proton, Waydroid, Podman, Distrobox, LXC, LXD, systemd-nspawn, Flatpak, Snap
# Apply with: sudo sysctl --system

# ── Virtual memory address space ──────────────────────────────────────────────
# Many games (especially Windows titles via Proton) create thousands of memory
# mappings. The default limit (65530) is too low and causes out-of-memory
# errors or crashes even when free RAM is available.
# Set to near-INT_MAX to effectively remove the limit.
vm.max_map_count = 2147483642

# ── inotify watches ───────────────────────────────────────────────────────────
# Game engines and launchers (Steam, Lutris, Wine) watch large directory trees
# for asset changes. The default limits (128 instances / 8192 watches) are hit
# quickly and cause silent failures or high CPU polling fallback.
# Raised to 8192 instances: LXD/LXC spin up a watcher per container; with
# Flatpak portals, Snap store daemon, and multiple containers running
# simultaneously, 1024 is easily exhausted.
fs.inotify.max_user_instances = 8192
fs.inotify.max_user_watches = 524288

# ── io_uring ──────────────────────────────────────────────────────────────────
# Ensure io_uring is enabled (some hardened kernels disable it).
# Required by newer game engines, Proton, and container runtimes for async IO.
kernel.io_uring_disabled = 0

# ── OOM behaviour ─────────────────────────────────────────────────────────────
# When OOM occurs, kill the process with the highest oom_score (worst offender)
# rather than the task that triggered the allocation. Prevents the game process
# itself from being killed when a background task caused the pressure.
vm.oom_kill_allocating_task = 0

# ── UDP socket buffers ────────────────────────────────────────────────────────
# Raise minimum UDP socket buffer sizes. Many multiplayer games use UDP and
# hit the default minimums (4096 bytes) under burst traffic, causing drops.
net.ipv4.udp_rmem_min = 16384
net.ipv4.udp_wmem_min = 16384

# ── IP forwarding — CRITICAL for all container networking ─────────────────────
# Without ip_forward=1, NO container runtime can route packets between the
# container network namespace and the outside world. This affects Podman,
# Distrobox, LXC, LXD, systemd-nspawn, Snap, and Waydroid equally.
# This was missing from all prior config files.
net.ipv4.ip_forward = 1
net.ipv4.conf.all.forwarding = 1

# IPv6 forwarding — required for any container using IPv6 networking.
# LXD enables IPv6 on its bridges by default; without this, IPv6 in
# containers is silently broken.
net.ipv6.conf.all.forwarding = 1
net.ipv6.conf.default.forwarding = 1

# ── Kernel keyrings — LXC / LXD ──────────────────────────────────────────────
# LXD allocates a kernel keyring per container for credential storage.
# The defaults (200 keys / 20000 bytes per user) are exhausted quickly
# when running several containers simultaneously.
kernel.keys.maxkeys = 2000
kernel.keys.maxbytes = 400000

# ── ARP neighbour table — large container deployments ────────────────────────
# Each container bridge interface gets ARP entries. With many containers
# (LXD, Podman pods, nspawn) the default gc_thresh values (128/512/1024)
# cause ARP cache thrashing and intermittent connectivity drops.
net.ipv4.neigh.default.gc_thresh1 = 512
net.ipv4.neigh.default.gc_thresh2 = 2048
net.ipv4.neigh.default.gc_thresh3 = 4096

# ── Per-interface RPF overrides for container bridge interfaces ───────────────
# rp_filter=2 (loose, set globally in 90-security-hardening.conf) still drops
# packets on asymmetric bridge routes during container startup races.
# Setting rp_filter=0 on known bridge interfaces guarantees correct routing.
# These keys are harmless when the interface does not exist.

# Waydroid
net.ipv4.conf.waydroid0.rp_filter = 0

# Podman — Netavark default bridge, legacy CNI bridge, additional networks
net.ipv4.conf.podman0.rp_filter = 0
net.ipv4.conf.podman1.rp_filter = 0
net.ipv4.conf.cni-podman0.rp_filter = 0

# LXD / LXC — default bridges created by lxd init / lxc-net
net.ipv4.conf.lxdbr0.rp_filter = 0
net.ipv4.conf.lxcbr0.rp_filter = 0

# libvirt / QEMU — virbr0 is created by libvirtd and used by some LXD profiles
net.ipv4.conf.virbr0.rp_filter = 0

# Docker-compatible bridges (used by Distrobox when Docker backend is selected,
# or if docker/moby is installed alongside Podman)
net.ipv4.conf.docker0.rp_filter = 0
