# Game compatibility sysctl settings for ShaniOS.
# Addresses limits that cause crashes, hangs, or silent failures in games,
# launchers (Steam, Lutris), and container runtimes (Proton, Waydroid).
# Apply with: sudo sysctl --system

# ── Virtual memory address space ──────────────────────────────────────────────
# Many games (especially Windows titles via Proton) create thousands of memory
# mappings. The default limit (65530) is too low and causes out-of-memory
# errors or crashes even when free RAM is available.
# Set to near-INT_MAX to effectively remove the limit.
vm.max_map_count = 2147483642

# ── inotify watches ───────────────────────────────────────────────────────────
# Game engines and launchers (Steam, Lutris, Wine) watch large directory trees
# for asset changes. The default limits (128 instances / 8192 watches) are hit
# quickly and cause silent failures or high CPU polling fallback.
fs.inotify.max_user_instances = 1024
fs.inotify.max_user_watches = 524288

# ── io_uring ──────────────────────────────────────────────────────────────────
# Ensure io_uring is enabled (some hardened kernels disable it).
# Required by newer game engines, Proton, and container runtimes for async IO.
kernel.io_uring_disabled = 0

# ── OOM behaviour ─────────────────────────────────────────────────────────────
# When OOM occurs, kill the process with the highest oom_score (worst offender)
# rather than the task that triggered the allocation. Prevents the game process
# itself from being killed when a background task caused the pressure.
vm.oom_kill_allocating_task = 0

# ── UDP socket buffers ────────────────────────────────────────────────────────
# Raise minimum UDP socket buffer sizes. Many multiplayer games use UDP and
# hit the default minimums (4096 bytes) under burst traffic, causing drops.
net.ipv4.udp_rmem_min = 16384
net.ipv4.udp_wmem_min = 16384
