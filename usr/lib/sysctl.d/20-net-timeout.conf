#
#  This is required due to some games being unable to reuse their TCP ports
#  if they're killed and restarted quickly - the default timeout is too large.

net.ipv4.tcp_fin_timeout = 5

#  Allow reuse of TIME_WAIT sockets for new outgoing connections.
#  Works together with tcp_fin_timeout to minimise port exhaustion when
#  games rapidly open and close connections.
net.ipv4.tcp_tw_reuse = 1

#  Do not reset the TCP congestion window after a connection goes idle.
#  Prevents throughput collapsing when a game reconnects after a brief pause.
net.ipv4.tcp_slow_start_after_idle = 0
