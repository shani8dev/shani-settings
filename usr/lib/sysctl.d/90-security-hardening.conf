# Security hardening sysctl settings for ShaniOS.
# Addresses Lynis KRNL-6000 findings and general desktop hardening best practice.
# Apply with: sudo sysctl --system

# ── TTY / Terminal ────────────────────────────────────────────────────────────
# Disable automatic line discipline loading to reduce attack surface.
dev.tty.ldisc_autoload = 0

# ── Address space layout randomisation ───────────────────────────────────────
# Full ASLR: randomise stack, VDSO, mmap, and heap base addresses.
# Default on Arch is already 2 — explicitly asserting it here prevents
# any accidental override by a third-party conf.
kernel.randomize_va_space = 2

# ── Filesystem protections ────────────────────────────────────────────────────
# Prevent hard-link attacks on files not owned by the user.
fs.protected_hardlinks = 1

# Prevent symlink following attacks in world-writable sticky directories.
fs.protected_symlinks = 1

# Prevent FIFO/pipe abuse in world-writable sticky directories.
fs.protected_fifos = 2

# Prevent regular-file abuse in world-writable sticky directories.
fs.protected_regular = 2

# Disable setuid process core dumps (prevents credential leaks in core files).
fs.suid_dumpable = 0

# ── Kernel pointer / symbol hiding ───────────────────────────────────────────
# Hide kernel pointers from all users (requires CAP_SYSLOG to see them).
kernel.kptr_restrict = 2

# Restrict dmesg to root (pairs with kptr_restrict — hides boot-time addresses).
kernel.dmesg_restrict = 1

# Restrict perf_event_open to privileged users (reduces side-channel attack surface).
kernel.perf_event_paranoid = 2

# ── Magic SysRq ───────────────────────────────────────────────────────────────
# Disable SysRq key combinations (prevents local privilege escalation via
# keyboard shortcuts). Set to 1 temporarily if you need Alt+SysRq for recovery.
kernel.sysrq = 0

# ── BPF hardening ─────────────────────────────────────────────────────────────
# Restrict unprivileged eBPF. Set to 1 (not 2) for container/gaming compat
# (Waydroid, Podman). Change to 2 on non-container systems for maximum hardening.
kernel.unprivileged_bpf_disabled = 1

# Harden the BPF JIT compiler against Spectre/info-leak attacks.
net.core.bpf_jit_harden = 2

# ── IPv4 network hardening ────────────────────────────────────────────────────
# Enable SYN cookie protection against SYN flood attacks.
net.ipv4.tcp_syncookies = 1

# Ignore ICMP broadcast echo requests (smurf attack mitigation).
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP error responses (reduces noise from misconfigured hosts).
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Reject ICMP redirect messages (prevents routing table manipulation).
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0

# Log packets from impossible source addresses (martians) for anomaly detection.
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Enable reverse path filtering to block spoofed source addresses.
# Set on both all and default so new interfaces (VPNs, containers) inherit it.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Do not send ICMP redirects (this host is not a router).
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# ── IPv6 network hardening ────────────────────────────────────────────────────
# Reject IPv6 ICMP redirect messages.
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# ── NOTE: kernel.modules_disabled = 1 intentionally omitted ──────────────────
# Setting it to 1 permanently blocks all future module loads until reboot,
# which breaks GPU drivers, USB hot-plug, and gaming peripherals.
# If you want it, add it last in a late-boot oneshot service after all modules load.
