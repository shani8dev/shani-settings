# Security hardening sysctl settings for ShaniOS.
# Addresses Lynis KRNL-6000 findings and general desktop hardening best practice.
# Tuned to remain compatible with: Podman, Distrobox, LXC, LXD, systemd-nspawn,
# Flatpak, Snap, Waydroid, AntiMicroX.
# Apply with: sudo sysctl --system

# ── TTY / Terminal ────────────────────────────────────────────────────────────
# Re-enabled: ldisc_autoload=0 breaks gamepad/joystick drivers that rely on
# automatic line discipline loading (e.g. hid, n_tty). AntiMicroX virtual
# input devices are affected when this is disabled.
dev.tty.ldisc_autoload = 1

# ── Address space layout randomisation ───────────────────────────────────────
# Full ASLR: randomise stack, VDSO, mmap, and heap base addresses.
# Default on Arch is already 2 — explicitly asserting it here prevents
# any accidental override by a third-party conf.
kernel.randomize_va_space = 2

# ── Filesystem protections ────────────────────────────────────────────────────
# Prevent hard-link attacks on files not owned by the user.
fs.protected_hardlinks = 1

# Prevent symlink following attacks in world-writable sticky directories.
fs.protected_symlinks = 1

# Prevent FIFO/pipe abuse in world-writable sticky directories.
# NOTE: kept at 2 — systemd-nspawn bind-mounts are unaffected because nspawn
# runs as root and protected_fifos only restricts unprivileged users.
fs.protected_fifos = 2

# Prevent regular-file abuse in world-writable sticky directories.
# NOTE: kept at 2 for same reason as protected_fifos above.
fs.protected_regular = 2

# Disable setuid process core dumps (prevents credential leaks in core files).
fs.suid_dumpable = 0

# ── Kernel pointer / symbol hiding ───────────────────────────────────────────
# Hide kernel pointers from all users (requires CAP_SYSLOG to see them).
kernel.kptr_restrict = 2

# Restrict dmesg to root (pairs with kptr_restrict — hides boot-time addresses).
# NOTE: containers running as unprivileged users cannot read host dmesg.
# This is intentional and acceptable — container logs go to journald anyway.
kernel.dmesg_restrict = 1

# Restrict perf_event_open to privileged users (reduces side-channel attack surface).
kernel.perf_event_paranoid = 2

# ── Magic SysRq ───────────────────────────────────────────────────────────────
# Disable SysRq key combinations (prevents local privilege escalation via
# keyboard shortcuts). Set to 1 temporarily if you need Alt+SysRq for recovery.
kernel.sysrq = 0

# ── BPF hardening ─────────────────────────────────────────────────────────────
# CHANGED from 1 to 0: unprivileged_bpf_disabled=1 breaks rootless Podman's
# Netavark network backend, which uses eBPF for port forwarding and traffic
# control hooks. With value=1, rootless pod port mappings silently fail and
# `podman network connect` between pods does not work without sudo.
# Value=0 still leaves JIT hardening (bpf_jit_harden=2) in place, which
# mitigates the main Spectre risk from unprivileged eBPF.
# Flatpak's bwrap seccomp filter and Snap's seccomp are unaffected (they load
# via privileged paths regardless of this setting).
kernel.unprivileged_bpf_disabled = 0

# Harden the BPF JIT compiler against Spectre/info-leak attacks.
# Kept at 2: this hardens the JIT regardless of unprivileged_bpf_disabled.
net.core.bpf_jit_harden = 2

# ── IPv4 network hardening ────────────────────────────────────────────────────
# Enable SYN cookie protection against SYN flood attacks.
net.ipv4.tcp_syncookies = 1

# Ignore ICMP broadcast echo requests (smurf attack mitigation).
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP error responses (reduces noise from misconfigured hosts).
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Accept ICMP redirects on all interfaces.
# Required for container bridge routing: Waydroid (waydroid0), Podman (podman0,
# cni-podman0), LXD (lxdbr0), and nspawn virtual ethernet pairs all need the
# host to accept redirects from their internal bridge addresses.
net.ipv4.conf.all.accept_redirects = 1
net.ipv4.conf.default.accept_redirects = 1

# Log packets from impossible source addresses (martians) for anomaly detection.
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Reverse path filtering — loose mode (2) instead of strict (1).
# Strict mode silently drops all traffic through container bridge interfaces
# (waydroid0, podman0, lxdbr0, etc.) because the return path goes through a
# different interface. Loose mode (2) still blocks spoofed source addresses
# but allows asymmetric bridge routing.
# Per-interface overrides to 0 are set in 80-gamecompatibility.conf for all
# known bridge names as an additional guarantee.
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2

# Allow container bridge interfaces to send ICMP redirects.
# send_redirects=0 on "all" suppresses redirects globally, but setting
# default=1 means new bridge interfaces (podman0, lxdbr0, waydroid0, etc.)
# inherit the ability to send redirects, which is needed for correct
# pod-to-pod routing across different bridge subnets.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 1

# ── IPv6 network hardening ────────────────────────────────────────────────────
# Accept IPv6 redirects — required for LXD's default IPv6-enabled bridges
# and any container runtime using IPv6 networking.
net.ipv6.conf.all.accept_redirects = 1
net.ipv6.conf.default.accept_redirects = 1

# ── NOTE: kernel.modules_disabled = 1 intentionally omitted ──────────────────
# Setting it to 1 permanently blocks all future module loads until reboot,
# which breaks GPU drivers, USB hot-plug, and gaming peripherals.
# If you want it, add it last in a late-boot oneshot service after all modules load.
