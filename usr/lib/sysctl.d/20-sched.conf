#  Group tasks by session so interactive apps get a fair share of CPU
#  against background batch work (default: 1 — explicitly asserting).
kernel.sched_autogroup_enabled = 1

#  After fork, run the parent first (not the child). Avoids a redundant
#  copy-on-write fault in the child when the parent immediately exec()s
#  (default: 0 — explicitly asserting).
kernel.sched_child_runs_first = 0

#  CFS scheduling slice for bandwidth-throttled cgroups (default: 5000 us).
#  Smaller slice reduces latency for containerised workloads.
kernel.sched_cfs_bandwidth_slice_us = 3000

#  Target scheduling period — how long before every runnable task gets a turn
#  (default: 24 ms on 8-core, scales with CPU count). 16 ms matches linux-zen
#  and gives snappier desktop/game response without excessive context switches.
kernel.sched_latency_ns = 16000000

#  Minimum task runtime before it can be preempted (default: 3 ms on 8-core).
#  1.6 ms matches linux-zen: finer-grained preemption on multi-core systems.
kernel.sched_min_granularity_ns = 1600000

#  Vruntime lead a woken task needs to preempt the current task (default: 4 ms).
#  2 ms matches linux-zen: woken tasks preempt sooner, reducing input latency.
kernel.sched_wakeup_granularity_ns = 2000000

#  Estimated cost of migrating a task to another CPU (default: 500 000 ns).
#  250 000 ns: more willing to rebalance across cores without being excessive.
kernel.sched_migration_cost_ns = 250000
