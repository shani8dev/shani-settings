# ShaniOS performance sysctl tuning.
# Applied at boot via sysctl --system (load order: 99 = last, wins over earlier files).

# ── Swap / ZRAM ───────────────────────────────────────────────────────────────
# High swappiness favours ZRAM (compressed RAM) over file-backed pages.
# 133 = strong preference for ZRAM; valid range 0–200 (kernel 5.8+).
vm.swappiness = 133

# With ZRAM, swap readahead is wasteful — decompression is per-page anyway.
# 0 = read exactly the faulted page, no readahead cluster.
vm.page-cluster = 0

# Reserve 1 GB of free physical RAM as a watermark.
# Prevents the kernel from exhausting RAM before ZRAM can absorb the pressure,
# eliminating the multi-second freeze that can occur when memory runs critically low.
vm.min_free_kbytes = 1048576

# ── VM writeback ──────────────────────────────────────────────────────────────
# Start background writeback at 5% dirty pages (default: 10%).
# Lower background ratio reduces sudden IO stalls in games on Btrfs CoW writes.
vm.dirty_background_ratio = 5

# Hard cap: force synchronous writeback at 20% dirty pages (default: 20% — unchanged).
vm.dirty_ratio = 20

# ── VM reclaim / compaction ───────────────────────────────────────────────────
# Reduce kernel eagerness to reclaim dentries/inodes (default: 100).
# 50 = keep more VFS cache in RAM; improves desktop responsiveness when RAM is ample.
vm.vfs_cache_pressure = 50

# Disable proactive memory compaction (default: 20).
# Proactive compaction causes latency spikes; with ZRAM it buys nothing.
vm.compaction_proactiveness = 0

# Disable kswapd boost on memory pressure (default: 15000).
# The boost causes brief latency spikes; ZRAM handles pressure better without it.
vm.watermark_boost_factor = 0

# Make kswapd start reclaiming earlier to avoid sudden OOM pressure (default: 10).
vm.watermark_scale_factor = 125

# Disable NUMA zone reclaim (default: 0 on UMA systems, but set explicitly).
# Zone reclaim can cause latency spikes by reclaiming local node memory
# aggressively. On a single-socket desktop this has no benefit.
vm.zone_reclaim_mode = 0

# Page lock unfairness — how many times a task can re-acquire a contended page
# lock before yielding to waiters (default: 5). Lower = more fair under load.
vm.page_lock_unfairness = 1

# ── Misc kernel ───────────────────────────────────────────────────────────────
# Disable NMI watchdog: speeds up boot/shutdown, reduces power consumption.
kernel.nmi_watchdog = 0

# Allow normal users to run unprivileged containers (Podman, Distrobox, Waydroid).
kernel.unprivileged_userns_clone = 1

# Suppress kernel messages from the console (shown via journald instead).
kernel.printk = 3 3 3 3

# ── Network buffers ───────────────────────────────────────────────────────────
# Large socket receive/send buffers for high-throughput local networking
# (containers, file transfers, game asset streaming). 128 MB each.
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
net.core.rmem_default = 262144
net.core.wmem_default = 262144

# Larger NIC packet backlog prevents drops under burst load (default: 1000).
net.core.netdev_max_backlog = 16384

# Larger listen queue for local services — Podman, game servers (default: 4096).
net.core.somaxconn = 8192

# ── TCP performance ───────────────────────────────────────────────────────────
# TCP Fast Open: reduce latency on repeated connections (client + server, value 3).
net.ipv4.tcp_fastopen = 3

# Enable PMTUD black hole detection — helps on networks with broken ICMP (default: 0).
net.ipv4.tcp_mtu_probing = 1

# ── TCP keepalive ─────────────────────────────────────────────────────────────
# Detect dead game/container connections faster (defaults: 7200s / 75s / 9 probes).
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 6
